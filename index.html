<section id="gramatica-aula1">
    <h3>Grammaire: Les bases</h3>

    <!-- Tabela de Pronomes Pessoais -->
    <h4>1. Pronomes Pessoais (Les pronoms personnels)</h4>
    <table class="tabela-gramatica">
        <thead>
            <tr>
                <th>Singular</th>
                <th>Plural</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td><strong>Je</strong> (Eu)</td>
                <td><strong>Nous</strong> (Nós)</td>
            </tr>
            <tr>
                <td><strong>Tu</strong> (Tu/Você)</td>
                <td><strong>Vous</strong> (Vós/Você/Vocês)</td>
            </tr>
            <tr>
                <td><strong>Il / Elle</strong> (Ele/Ela)</td>
                <td><strong>Ils / Elles</strong> (Eles/Elas)</td>
            </tr>
        </tbody>
    </table>

    <!-- Tabela do Verbo Être -->
    <h4>2. Verbo Être (Presente do Indicativo)</h4>
    <table class="tabela-gramatica">
        <tbody>
            <tr><td>Je <strong>suis</strong></td><td>Nous <strong>sommes</strong></td></tr>
            <tr><td>Tu <strong>es</strong></td><td>Vous <strong>êtes</strong></td></tr>
            <tr><td>Il / Elle <strong>est</strong></td><td>Ils / Elles <strong>sont</strong></td></tr>
        </tbody>
    </table>
</section>
