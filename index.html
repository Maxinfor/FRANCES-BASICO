<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Francês Básico - App de Estudos</title>
    <style>
        body { font-family: sans-serif; display: flex; margin: 0; background-color: #f4f4f9; }
        .sidebar { width: 250px; background: #2c3e50; color: white; height: 100vh; padding: 20px; }
        .content { flex-grow: 1; padding: 40px; }
        .progress-bar { background: #34495e; height: 10px; border-radius: 5px; margin: 10px 0; }
        #progress-fill { background: #2ecc71; height: 100%; width: 12.5%; transition: width 0.5s; }
        button { background: #3498db; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 5px; margin-top: 20px; }
        button:hover { background: #2980b9; }
    </style>
</head>
<body>

    <nav class="sidebar">
        <h2>Francês Básico</h2>
        <div class="progress-bar"><div id="progress-fill"></div></div>
        <ul style="list-style: none; padding: 0;">
            <li><a href="#" style="color:white; text-decoration:none;" onclick="carregarAula(1)">Aula 1: Présentation</a></li>
        </ul>
    </nav>

    <main class="content" id="conteudo-aula">
        <h1>Bem-vindo</h1>
        <p>Selecione uma aula no menu lateral para começar.</p>
    </main>

    <script>
        // Banco de dados das aulas
        const lecons = {
            1: {
                titulo: "Aula 1: Présentation",
                introducao: "Nesta lição, aprenderá a fazer saudações e a apresentar-se[span_0](start_span)[span_0](end_span).",
                cumprimentos: ["Bonjour (Formal)", "Salut (Informal)", "Bonsoir (Boa noite)"],
                gramatica: ["Je suis (Eu sou)", "Tu es (Tu és/Você é)", "Il/Elle est (Ele/Ela é)", "Nous sommes (Nós somos)", "Vous êtes (Vocês são)", "Ils/Elles sont (Eles/Elas são)"]
            }
        };

        function carregarAula(num) {
            const aula = lecons[num];
            const proxima = parseInt(num) + 1;
            const temProxima = lecons.hasOwnProperty(proxima);

            // Atualiza barra de progresso
            document.getElementById('progress-fill').style.width = (num / 8 * 100) + "%";

            // Renderiza o conteúdo
            let htmlConteudo = `
                <h1>${aula.titulo}</h1>
                <p>${aula.introducao}</p>
                <h3>1. Comunicação</h3>
                <ul>${aula.cumprimentos.map(c => `<li>${c}</li>`).join('')}</ul>
                <h3>2. Gramática: Verbo Être</h3>
                <ul>${aula.gramatica.map(g => `<li>${g}</li>`).join('')}</ul>
            `;

            // Botão de navegação
            if (temProxima) {
                htmlConteudo += `<button onclick="carregarAula(${proxima})">Ir para Aula ${proxima} →</button>`;
            } else {
                htmlConteudo += `<p>Parabéns! Você concluiu a estrutura disponível.</p>`;
            }

            document.getElementById('conteudo-aula').innerHTML = htmlConteudo;
        }

        // Carrega aula inicial
        window.onload = () => carregarAula(1);
    </script>
</body>
</html>
