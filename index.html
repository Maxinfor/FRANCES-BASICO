<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <title>App Francês Básico</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; display: flex; background-color: #fdfbf7; }
        .sidebar { width: 250px; background: #2c3e50; color: white; height: 100vh; padding: 20px; box-sizing: border-box; }
        .content { flex-grow: 1; padding: 40px; }
        h1 { color: #2c3e50; border-bottom: 3px solid #27ae60; padding-bottom: 10px; }
        .exercise { margin-top: 30px; padding: 20px; background: #e8f6ed; border-radius: 5px; border-left: 5px solid #27ae60; }
        .btn { background: #27ae60; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 4px; margin-top: 10px; }
        li { margin-bottom: 8px; }
    </style>
</head>
<body>

    <nav class="sidebar">
        <h2>Francês Básico</h2>
        <ul>
            <li><a href="#" style="color:white; text-decoration:none;" onclick="carregarAula1()">Aula 1: Présentation</a></li>
            <li><a href="#" style="color:white; text-decoration:none;" onclick="carregarAula2()">Aula 2: Faire Connaissance</a></li>
        </ul>
    </nav>

    <main class="content" id="conteudo-aula">
        <h1>Bem-vindo</h1>
        <p>Selecione uma aula no menu lateral para começar seus estudos.</p>
    </main>

    <script>
        function carregarAula1() {
            const html = `
                <h1>Aula 1: Présentation</h1>
                <h3>Conceitos</h3>
                <ul>
                    <li>Bonjour, Salut, Bonsoir</li>
                    <li>Verbo Être: Je suis, Tu es, Il/Elle est, Nous sommes, Vous êtes</li>
                </ul>
                <div class="exercise">
                    <h3>Exercício: Complete com o verbo Être</h3>
                    <p>Je _____ étudiant. <input type="text" id="ex1"></p>
                    <button class="btn" onclick="verificarAula1()">Verificar</button>
                    <p id="res1"></p>
                </div>
            `;
            document.getElementById('conteudo-aula').innerHTML = html;
        }

        function carregarAula2() {
            const html = `
                <h1>Aula 2: Faire Connaissance</h1>
                <h3>Verbos em -ER (Ex: Parler)</h3>
                <p>Terminações: -e, -es, -e, -ons, -ez, -ent.</p>
                <ul>
                    <li>Je parle, Tu parles, Il parle</li>
                    <li>Nous parlons, Vous parlez, Ils parlent</li>
                </ul>
                <div class="exercise">
                    <h3>Exercício: Conjugação</h3>
                    <p>Je _____ (habiter) à Brasília. <input type="text" id="ex2"></p>
                    <button class="btn" onclick="verificarAula2()">Verificar</button>
                    <p id="res2"></p>
                </div>
            `;
            document.getElementById('conteudo-aula').innerHTML = html;
        }

        function verificarAula1() {
            const res = document.getElementById('ex1').value.toLowerCase();
            document.getElementById('res1').innerHTML = (res === "suis") ? "<b>Correto!</b>" : "<b>Tente novamente.</b>";
        }

        function verificarAula2() {
            const res = document.getElementById('ex2').value.toLowerCase();
            document.getElementById('res2').innerHTML = (res === "habite") ? "<b>Correto!</b>" : "<b>Lembre-se da terminação -e.</b>";
        }
    </script>
</body>
</html>
